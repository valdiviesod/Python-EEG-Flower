<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 190.496 190.497" width="400" height="400">
  <!--
    NAD Brain Zone Map — realistic brain silhouette (front-facing)
    Original brain outline + sulci from brain_original.svg
    Zone overlays: simple shapes clipped to the outline by scalp_map.js

    Zones (each a separate path with data-zone attribute):
      frontal    → AF7 + AF8  (top / forehead)
      parietal   → all 4 avg  (center-top / crown)
      occipital  → TP9 + TP10 (back / lower)
      temporal_l → TP9        (left side)
      temporal_r → TP10       (right side)
  -->

  <!-- ══════════════════════════════════════════════════════════════════════
       ZONE OVERLAYS — simple shapes that extend beyond the brain;
       scalp_map.js clips them to the outline path.
       2px overlap at shared boundaries to prevent gaps.
       ══════════════════════════════════════════════════════════════════════ -->

  <!-- FRONTAL (top band, full width) -->
  <path data-zone="frontal"
    d="M -5,-5 L 196,-5 L 196,67 L -5,67 Z"
    fill="#8B5CF6"/>

  <!-- TEMPORAL LEFT (left strip, below frontal) -->
  <path data-zone="temporal_l"
    d="M -5,63 L 70,63 L 70,196 L -5,196 Z"
    fill="#F97316"/>

  <!-- TEMPORAL RIGHT (right strip, below frontal) -->
  <path data-zone="temporal_r"
    d="M 120,63 L 196,63 L 196,196 L 120,196 Z"
    fill="#EAB308"/>

  <!-- PARIETAL (center band, between temporal strips) -->
  <path data-zone="parietal"
    d="M 66,63 L 124,63 L 124,117 L 66,117 Z"
    fill="#22C55E"/>

  <!-- OCCIPITAL (lower center, between temporal strips) -->
  <path data-zone="occipital"
    d="M 66,113 L 124,113 L 124,196 L 66,196 Z"
    fill="#EC4899"/>

  <!-- ══════════════════════════════════════════════════════════════════════
