<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!--
    NAD Brain Zone Map — top-down view
    Zones (each a separate path with data-zone attribute):
      frontal    → AF7 + AF8  (anterior)
      parietal   → all 4 avg  (superior center)
      occipital  → TP9 + TP10 (posterior)
      temporal_l → TP9        (left)
      temporal_r → TP10       (right)
  -->

  <!-- ── FRONTAL LOBE (AF7+AF8) ─────────────────────────────────────────── -->
  <path data-zone="frontal"
    d="M 200,28 C 240,26 278,34 304,58 C 332,84 346,118 348,152 L 310,158 C 298,140 280,122 260,110 C 240,98 220,92 200,90 C 180,92 160,98 140,110 C 120,122 102,140 90,158 L 52,152 C 54,118 68,84 96,58 C 122,34 160,26 200,28 Z"
    fill="#8B5CF6"/>

  <!-- ── PARIETAL LOBE (all-avg) ────────────────────────────────────────── -->
  <path data-zone="parietal"
    d="M 90,158 C 102,140 120,122 140,110 C 160,98 180,92 200,90 C 220,92 240,98 260,110 C 280,122 298,140 310,158 L 320,210 C 308,220 290,228 270,232 C 248,236 224,238 200,238 C 176,238 152,236 130,232 C 110,228 92,220 80,210 Z"
    fill="#22C55E"/>

  <!-- ── OCCIPITAL LOBE (TP9+TP10) ─────────────────────────────────────── -->
  <path data-zone="occipital"
    d="M 80,210 C 92,220 110,228 130,232 C 152,236 176,238 200,238 C 224,238 248,236 270,232 C 290,228 308,220 320,210 L 326,250 C 310,278 286,298 264,310 C 248,320 228,332 218,350 C 212,360 208,370 200,372 C 192,370 188,360 182,350 C 172,332 152,320 136,310 C 114,298 90,278 74,250 Z"
    fill="#EC4899"/>

  <!-- ── TEMPORAL LEFT (TP9) ────────────────────────────────────────────── -->
  <path data-zone="temporal_l"
    d="M 52,152 L 90,158 L 80,210 L 74,250 C 58,222 50,188 52,152 Z"
    fill="#F97316"/>

  <!-- ── TEMPORAL RIGHT (TP10) ──────────────────────────────────────────── -->
  <path data-zone="temporal_r"
    d="M 348,152 C 350,188 342,222 326,250 L 320,210 L 310,158 Z"
    fill="#EAB308"/>

  <!-- ── SULCI (zone borders / anatomical lines) ───────────────────────── -->
  <!-- Central sulcus -->
  <path class="sulcus" d="M 90,158 C 130,165 170,168 200,168 C 230,168 270,165 310,158" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Parieto-occipital sulcus -->
  <path class="sulcus" d="M 80,210 C 130,215 170,218 200,218 C 230,218 270,215 320,210" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Lateral sulcus left -->
  <path class="sulcus" d="M 90,158 C 82,178 80,198 80,210" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Lateral sulcus right -->
  <path class="sulcus" d="M 310,158 C 318,178 320,198 320,210" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Interhemispheric fissure (midline dashed) -->
  <path class="sulcus" d="M 200,28 C 200,100 200,160 200,238 C 200,300 200,345 200,372" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1" stroke-linecap="round" stroke-dasharray="5 7"/>

  <!-- ── OUTER OUTLINE STROKE ───────────────────────────────────────────── -->
  <path id="outline"
    d="M 200,28 C 240,26 278,34 304,58 C 332,84 346,118 348,152 C 350,188 342,222 326,250 C 310,278 286,298 264,310 C 248,320 228,332 218,350 C 212,360 208,370 200,372 C 192,370 188,360 182,350 C 172,332 152,320 136,310 C 114,298 90,278 74,250 C 58,222 50,188 52,152 C 54,118 68,84 96,58 C 122,34 160,26 200,28 Z"
    fill="none" stroke="rgba(180,160,255,0.6)" stroke-width="2.5"/>
</svg>
