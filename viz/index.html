<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización Creativa EEG | Psicología del Color</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Chart.js for background analysis if needed, but main viz is custom Canvas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script> 
</head>
<body>
    <div class="app-container">
        <!-- Header / Overlay -->
        <header class="glass-panel header">
            <div class="logo">
                <span class="icon">🧠</span>
                <h1>Neuro<span class="highlight">Vibe</span></h1>
            </div>
            <div class="controls">
                <button id="btn-play" class="btn-icon">▶</button>
                <button id="btn-pause" class="btn-icon hidden">⏸</button>
                <div class="slider-container">
                    <span>Velocidad</span>
                    <input type="range" id="speed-slider" min="1" max="10" value="2">
                </div>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span id="connection-status">Cargando datos...</span>
            </div>
        </header>

        <!-- Main Visualization Canvas -->
        <main class="viz-container">
            <canvas id="neuro-canvas"></canvas>
            
            <!-- Psychological Insight Overlay -->
            <div class="insight-panel glass-panel">
                <h3 id="psy-state-title">Estado Neutral</h3>
                <p id="psy-state-desc">Esperando señal...</p>
                <div class="color-meaning">
                    <div class="color-swatch" id="current-color"></div>
                    <span id="color-name">--</span>
                </div>
                <div class="metrics">
                    <div class="metric">
                        <span class="label">Amplitud</span>
                        <span class="value" id="amp-val">0 µV</span>
                    </div>
                    <div class="metric">
                        <span class="label">Frecuencia (Est.)</span>
                        <span class="value" id="freq-val">0 Hz</span>
                    </div>
                </div>
            </div>
        </main>

        <!-- Channel Legend / Footer -->
        <footer class="glass-panel footer">
            <div class="channels">
                <div class="channel-item" data-ch="1">
                    <span class="ch-dot ch1"></span> TP9
                </div>
                <div class="channel-item" data-ch="2">
                    <span class="ch-dot ch2"></span> AF7
                </div>
                <div class="channel-item" data-ch="3">
                    <span class="ch-dot ch3"></span> AF8
                </div>
                <div class="channel-item" data-ch="4">
                    <span class="ch-dot ch4"></span> TP10
                </div>
            </div>
            <div class="scrubber-container">
                <input type="range" id="time-scrubber" min="0" max="100" value="0">
                <div class="time-readout"><span id="current-time">00:00</span> / <span id="total-time">00:00</span></div>
            </div>
        </footer>
    </div>

    <script src="data_loader.js"></script>
    <script src="visualizer.js"></script>
</body>
</html>
